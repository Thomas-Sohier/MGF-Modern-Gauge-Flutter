name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Installation de Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Installation des dépendances
        run: flutter pub get
      - name: Lancement des tests
        run: flutter test
      - name: Installation des dépendances système pour Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Construction de l'application Linux (Release)
        run: flutter build linux --release
      - name: Génération du nom du tag snapshot
        id: generate_tag 
        run: echo "TAG_NAME=snapshot-$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Archivage des artefacts de la release
        id: archive_artifacts
        run: |
          cd build/linux/x64/release/bundle
          # On utilise le tag généré pour nommer l'archive, c'est plus propre
          tar -czvf ../../../../snapshot-mgf-linux-x64.tar.gz .
      - name: Création de la Release GitHub et téléversement de l'artefact
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate_tag.outputs.TAG_NAME }}
          name: "Snapshot ${{ steps.generate_tag.outputs.TAG_NAME }}"
          body: "Automated snapshot release."
          draft: false 
          prerelease: true 
          files: |
            snapshot-mgf-linux-x64.tar.gz
