name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Generate snapshot tag
        id: generate_tag 
        run: echo "TAG_NAME=snapshot-$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Create and push tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.generate_tag.outputs.TAG_NAME }} -a -m "Snapshot release ${{ steps.generate_tag.outputs.TAG_NAME }}"
          git push origin ${{ steps.generate_tag.outputs.TAG_NAME }}
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.generate_tag.outputs.TAG_NAME }}
          release_name: "Snapshot ${{ steps.generate_tag.outputs.TAG_NAME }}"
          body: "Automated snapshot release."
          draft: true
          prerelease: false
      - name: Installation de Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Installation des dépendances
        run: flutter pub get
      - name: Lancement des tests
        run: flutter test
      - name: Installation des dépendances système pour Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Construction de l'application Linux (Release)
        run: flutter build linux --release
      - name: Archivage des artefacts de la release
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../${{ github.ref_name }}-linux-x64.tar.gz .
      - name: Création de la Release GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.tar.gz
