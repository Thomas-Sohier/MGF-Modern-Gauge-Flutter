name: modern_gauge_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  dbus: ^0.7.11
  flutter:
    sdk: flutter
  go_router: ^16.2.4
  http: ^1.6.0
  image: ^4.5.4
  intl: ^0.20.2
  logger: ^2.6.2
  marquee: ^2.3.0
  material_color_utilities: ^0.11.1
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  syncfusion_flutter_gauges: ^31.1.23
  web_socket_channel: ^3.0.3

dev_dependencies:
  build_runner: ^2.4.7
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700